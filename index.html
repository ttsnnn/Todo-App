<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App Mine</title>
  <link rel="stylesheet" href="style.css">
  <script src="app.js" defer type="module"></script>
</head>

<body>
  <h1>Todo App</h1>
  <div class="wrapper">
    <form>
      <div class="input-row">
        <input type="text" placeholder="write something..." id="todo-input" autocomplete="off">
        <input type="date" id="deadline-input">
        <button id="add-button">ADD</button>
      </div>
    </form>

    <div class="sort-controls">
      <button id="sort-new">Сначала новые</button>
      <button id="sort-old">Сначала старые</button>
    </div>

    <ul id="todo-list"></ul>
  </div>
</body>

</html>
